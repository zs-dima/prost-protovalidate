name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo clippy --all-targets -p prost-protovalidate --no-default-features -- -D warnings
      - run: cargo clippy --all-targets -p prost-protovalidate --no-default-features --features tonic -- -D warnings

  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.86"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --all-features
      - run: cargo test -p prost-protovalidate --no-default-features
      - run: cargo test -p prost-protovalidate-tests --no-default-features
      # The `tonic` feature without `tonic-types` is a distinct cfg path
      # (no BadRequest detail attachment). Exercise it explicitly so
      # gating regressions surface in CI.
      - run: cargo test -p prost-protovalidate --no-default-features --features tonic
      - run: cargo bench --no-run -p prost-protovalidate --all-features

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -Dwarnings
      - run: cargo doc --no-deps -p prost-protovalidate --no-default-features
        env:
          RUSTDOCFLAGS: -Dwarnings

  deny:
    name: Deny (License & Advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false # no go.mod in this repo; Go is only used to install the conformance harness
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: make conformance

  semver:
    name: SemVer Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: prost-protovalidate-types
        # Generated types mirror upstream proto definitions; new oneof/enum
        # variants from upstream are always semver-breaking on exhaustive enums.
        continue-on-error: true
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: prost-protovalidate
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: prost-protovalidate-build
