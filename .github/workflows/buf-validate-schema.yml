name: buf-validate-schema

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schema-drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Verify validate.proto matches PROTOVALIDATE_SCHEMA_REF
        run: make sync-schema-check
